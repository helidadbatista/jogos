<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Palavrinhas" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" />
    <style>
      html, body { margin: 0; min-height: 100%; background: #fde68a; }
      body {
        background: linear-gradient(135deg, #fde68a, #fbcfe8 50%, #bfdbfe);
        background-attachment: fixed;
      }
      #root { min-height: 100vh; min-height: 100dvh; }
      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: linear-gradient(135deg, #fde68a, #fbcfe8 50%, #bfdbfe);
        font-family: 'Comic Sans MS', system-ui, sans-serif;
        text-align: center;
        padding: 20px;
        animation: splashFade 0.4s ease;
      }
      .splash svg { width: min(40vw, 200px); height: auto; }
      .splash h1 {
        font-size: clamp(20px, 5vw, 30px);
        color: #1e40af;
        margin: 0;
        text-shadow: 1.5px 1.5px 0 #fff;
      }
      .splash .dots {
        display: flex;
        gap: 8px;
      }
      .splash .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        animation: dotBounce 1.2s infinite ease-in-out;
      }
      .splash .dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-8px); opacity: 1; }
      }
      @keyframes splashFade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
    <title>Brincadeiras de Palavras</title>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(256 270)">
            <polygon points="-110,-100 -135,-180 -55,-130" fill="#f59e0b" stroke="#92400e" stroke-width="6" stroke-linejoin="round"/>
            <polygon points="110,-100 135,-180 55,-130" fill="#f59e0b" stroke="#92400e" stroke-width="6" stroke-linejoin="round"/>
            <polygon points="-105,-110 -120,-160 -65,-130" fill="#fca5a5"/>
            <polygon points="105,-110 120,-160 65,-130" fill="#fca5a5"/>
            <ellipse cx="0" cy="-20" rx="140" ry="125" fill="#fbbf24" stroke="#92400e" stroke-width="6"/>
            <circle cx="-85" cy="35" r="25" fill="#fb7185" opacity="0.5"/>
            <circle cx="85" cy="35" r="25" fill="#fb7185" opacity="0.5"/>
            <ellipse cx="-50" cy="-30" rx="18" ry="22" fill="#1f2937"/>
            <ellipse cx="50" cy="-30" rx="18" ry="22" fill="#1f2937"/>
            <circle cx="-44" cy="-38" r="7" fill="#ffffff"/>
            <circle cx="56" cy="-38" r="7" fill="#ffffff"/>
            <path d="M -16 10 Q 0 25 16 10 Q 0 0 -16 10 Z" fill="#ec4899" stroke="#831843" stroke-width="3" stroke-linejoin="round"/>
            <path d="M -25 30 Q -12 35 0 30 Q 12 35 25 30" stroke="#1f2937" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="-140" y1="20" x2="-50" y2="15" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
            <line x1="-140" y1="40" x2="-50" y2="30" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
            <line x1="140" y1="20" x2="50" y2="15" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
            <line x1="140" y1="40" x2="50" y2="30" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
          </g>
        </svg>
        <h1>Brincadeiras de Palavras</h1>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
